<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام جسور وركن</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>إضافة رحلة جديدة</h2>
        <input type="text" id="driver" placeholder="اسم السائق">
        <input type="number" id="revenue" placeholder="الإيراد">
        <button onclick="saveData()">حفظ العملية</button>
    </div>

    <script>
        const supabase = supabase.createClient('https://rkabgggresuqcncujdwm.supabase.co/rest/v1/', 'sb_publishable_GZh71t88deBXJaE-19LwCw_EeCrPUKj');

        async function saveData() {
            const driver = document.getElementById('driver').value;
            const rev = document.getElementById('revenue').value;
            
            const { error } = await supabase.from('trips').insert([{ driver_name: driver, revenue: rev }]);
            
            if (error) alert('خطأ: ' + error.message);
            else alert('تم الحفظ بنجاح!');
        }
    </script>
</body>
</html>
