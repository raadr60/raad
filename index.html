<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسور وركن - نظام الإدارة</title>
    <!-- مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; font-weight: bold; cursor: pointer; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>

    <div class="container">
        <h2>إضافة رحلة جديدة</h2>
        <select id="company">
            <option value="1">جسور المسافات</option>
            <option value="2">ركن المشروعات</option>
        </select>
        <input type="number" id="revenue" placeholder="الإيراد">
        <input type="number" id="expenses" placeholder="المصروفات">
        <input type="text" id="driver" placeholder="اسم السائق">
        <button onclick="addTrip()">حفظ البيانات</button>
    </div>

    <script>
        // --- ضع بياناتك هنا ---
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

        async function addTrip() {
            const tripData = {
                company_id: document.getElementById('company').value,
                revenue: document.getElementById('revenue').value,
                expenses: document.getElementById('expenses').value,
                driver_name: document.getElementById('driver').value
            };

            const { data, error } = await supabase.from('trips').insert([tripData]);

            if (error) {
                alert("خطأ: " + error.message);
            } else {
                alert("تم حفظ الرحلة بنجاح!");
                location.reload();
            }
        }
    </script>
</body>
</html>
